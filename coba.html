<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sidebar Auto Close</title>

        <style>
            body {
                margin: 0;
                font-family:
                    Segoe UI,
                    sans-serif;
                background: #f5f5f5;
            }

            /* tombol toggle */

            .toggle-btn {
                position: fixed;
                top: 15px;
                left: 15px;
                font-size: 24px;
                cursor: pointer;
                background: #3f51ff;
                color: white;
                padding: 6px 12px;
                border-radius: 5px;
                z-index: 1001;
            }

            /* SIDEBAR */

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                width: 250px;
                height: 100%;
                background: #d6d1d9;
                transition: 0.3s;
                z-index: 1000;
            }

            /* sidebar tertutup */

            .sidebar.close {
                left: -250px;
            }

            /* PROFILE */

            .profile {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 20px;
                border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            }

            .profile img {
                width: 50px;
                height: 50px;
                border-radius: 50%;
            }

            .profile h3 {
                margin: 0;
                font-size: 18px;
            }

            .profile p {
                margin: 0;
                font-size: 13px;
                color: #555;
            }

            /* MENU */

            .menu a {
                display: block;
                padding: 15px 20px;
                text-decoration: none;
                color: #333;
            }

            .menu a:hover {
                background: #cfc9d2;
            }

            .menu a.active {
                background: #c7c1cc;
                border-top: 2px solid #3f51ff;
                border-bottom: 2px solid #3f51ff;
            }

            /* CONTENT */

            .content {
                padding: 40px;
                margin-left: 250px;
                transition: 0.3s;
            }

            .content.full {
                margin-left: 0;
            }
        </style>
    </head>

    <body>
        <div class="toggle-btn" onclick="toggleSidebar()">☰</div>

        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="profile">
                <img
                    src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                />
                <div>
                    <h3>Username</h3>
                    <p>Accountname</p>
                </div>
            </div>

            <div class="menu">
                <a href="#">Setting Account</a>
                <a href="#">Buku Tersimpan</a>
                <a href="#">Scane Barcode</a>
                <a href="#" class="active">Settings</a>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content" id="content">
            <h1>Dashboard</h1>
            <p>Klik area kosong di luar sidebar untuk menutup sidebar.</p>
        </div>

        <script>
            let sidebar = document.getElementById("sidebar");
            let content = document.getElementById("content");

            function toggleSidebar() {
                sidebar.classList.toggle("close");
                content.classList.toggle("full");
            }

            /* klik luar sidebar */

            document.addEventListener("click", function (event) {
                if (
                    !sidebar.contains(event.target) &&
                    !event.target.classList.contains("toggle-btn")
                ) {
                    sidebar.classList.add("close");
                    content.classList.add("full");
                }
            });
        </script>
    </body>
</html>
